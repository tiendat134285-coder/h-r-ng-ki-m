<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Smilodon</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >

      <!-- Load model -->
      <a-assets>
        <a-asset-item id="tiger-obj" src="12230_smilodon_v1_l2.obj"></a-asset-item>
        <a-asset-item id="tiger-mtl" src="12230_smilodon_v1_l2.mtl"></a-asset-item>
      </a-assets>

      <!-- Marker -->
      <a-marker preset="hiro">
        
        <a-obj-model 
          src="#tiger-obj"
          mtl="#tiger-mtl"

          <!-- 🎯 FIX KÍCH THƯỚC -->
          position="0 0.4 0"
          scale="0.01 0.01 0.01"
          rotation="-90 0 0"

          animation="property: rotation; to: -90 360 0; loop: true; dur: 8000">
        </a-obj-model>

      </a-marker>

      <!-- ánh sáng -->
      <a-entity light="type: directional; intensity: 1" position="1 2 1"></a-entity>
      <a-entity light="type: ambient; intensity: 0.6"></a-entity>

      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
